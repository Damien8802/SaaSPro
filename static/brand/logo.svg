    <circle cx="30" cy="35" r="5" fill="white"/>
    
    <!-- Текст SaaSPro -->
    <text x="65" y="38" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" fill="url(#grad)">SaaSPro</text>
    
