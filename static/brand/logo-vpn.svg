<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60">
    <defs>
        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#667eea"/>
            <stop offset="100%" style="stop-color:#764ba2"/>
        </linearGradient>
    </defs>
    
    <!-- Щит -->
    <rect x="5" y="5" width="50" height="50" rx="12" fill="url(#grad)"/>
    
    <!-- Замок -->
    <rect x="22" y="28" width="16" height="12" rx="2" fill="white"/>
    <rect x="26" y="32" width="8" height="8" rx="1" fill="url(#grad)"/>
    <circle cx="30" cy="36" r="2" fill="white"/>
    
    <!-- Молния -->
    <path d="M35 12 L28 26 L35 26 L30 40" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Текст SaaSPro -->
    <text x="65" y="35" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" fill="url(#grad)">SaaSPro</text>
    
    <!-- VPN Badge -->
    <rect x="140" y="22" width="45" height="18" rx="9" fill="url(#grad)"/>
    <text x="153" y="35" font-family="Arial, sans-serif" font-size="11" fill="white" font-weight="700">VPN</text>
    
    <!-- Слоган -->
    <text x="65" y="50" font-family="Arial, sans-serif" font-size="9" fill="#999" letter-spacing="1">SECURE & FAST</text>
</svg>