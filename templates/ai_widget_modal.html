<!-- AI Widget with Modal -->
<style>
.ai-floating-widget{position:fixed;bottom:20px;right:20px;z-index:10000}
.ai-widget-button{width:56px;height:56px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 15px rgba(0,0,0,0.3);transition:all .3s;border:none;font-size:26px;color:#fff}
.ai-widget-button:hover{transform:scale(1.1)}
.ai-widget-tooltip{position:absolute;bottom:65px;right:0;background:rgba(0,0,0,0.8);color:#fff;padding:6px 12px;border-radius:12px;font-size:12px;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none}
.ai-floating-widget:hover .ai-widget-tooltip{opacity:1}
.ai-modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(5px);z-index:10001;justify-content:center;align-items:center}
.ai-modal{width:450px;max-width:90%;height:600px;max-height:80vh;background:#fff;border-radius:24px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5);animation:modalFadeIn .3s ease}
@keyframes modalFadeIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
.ai-modal-header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:16px 20px;display:flex;justify-content:space-between;align-items:center}
.ai-modal-header h3{margin:0;font-size:18px;display:flex;align-items:center;gap:10px}
.ai-modal-header .close-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px}
.ai-modal-header .close-btn:hover{background:rgba(255,255,255,0.3);transform:scale(1.05)}
.ai-modal-status{font-size:11px;background:rgba(255,255,255,0.2);padding:4px 10px;border-radius:20px}
.ai-modal-messages{flex:1;overflow-y:auto;padding:16px;background:#f8f9fa;display:flex;flex-direction:column;gap:12px}
.ai-msg{display:flex;gap:10px;animation:fadeIn .3s ease}
.ai-msg.user{flex-direction:row-reverse}
.ai-msg-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ai-msg.user .ai-msg-avatar{background:linear-gradient(135deg,#667eea,#764ba2)}
.ai-msg.assistant .ai-msg-avatar{background:linear-gradient(135deg,#10b981,#059669)}
.ai-msg-content{max-width:75%;padding:10px 14px;border-radius:18px;font-size:13px;line-height:1.5}
.ai-msg.user .ai-msg-content{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-bottom-right-radius:4px}
.ai-msg.assistant .ai-msg-content{background:#fff;color:#333;border:1px solid #e0e0e0;border-bottom-left-radius:4px}
.ai-msg-content strong{color:#667eea}
.ai-modal-input{padding:12px 16px;background:#fff;border-top:1px solid #e0e0e0;display:flex;gap:10px}
.ai-modal-input input{flex:1;padding:10px 16px;border:1px solid #ddd;border-radius:30px;outline:none;font-size:14px}
.ai-modal-input input:focus{border-color:#667eea}
.ai-modal-input button{padding:10px 20px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:30px;cursor:pointer;font-weight:600}
.ai-typing{display:flex;gap:4px;padding:10px 14px;background:#fff;border-radius:18px;width:fit-content;border:1px solid #e0e0e0}
.ai-typing span{width:8px;height:8px;background:#999;border-radius:50%;animation:typing 1.4s infinite}
.ai-typing span:nth-child(2){animation-delay:.2s}
.ai-typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.ai-quick-buttons{display:flex;gap:8px;padding:10px 16px;background:#f8f9fa;border-top:1px solid #e0e0e0;flex-wrap:wrap}
.ai-quick-btn{background:#fff;border:1px solid #ddd;padding:5px 12px;border-radius:20px;font-size:11px;cursor:pointer}
.ai-quick-btn:hover{background:#667eea;color:#fff;border-color:#667eea}
</style>

<div class="ai-floating-widget">
    <div class="ai-widget-button" onclick="openAIModal()">🤖</div>
    <div class="ai-widget-tooltip">AI ассистент</div>
</div>

<div class="ai-modal-overlay" id="aiModalOverlay" onclick="if(event.target===this) closeAIModal()">
    <div class="ai-modal">
        <div class="ai-modal-header">
            <h3><i class="fas fa-robot"></i> AI ассистент</h3>
            <div><span class="ai-modal-status"><i class="fas fa-circle" style="font-size:8px;color:#10b981"></i> Онлайн</span>
            <button class="close-btn" onclick="closeAIModal()">✕</button></div>
        </div>
        <div class="ai-modal-messages" id="aiModalMessages">
            <div class="ai-msg assistant">
                <div class="ai-msg-avatar">🤖</div>
                <div class="ai-msg-content"><strong>👋 Привет!</strong><br>Я AI ассистент SaaSPro.<br><br>❓ "Сколько стоит разработка телеграм-бота?"<br>📋 "Создай клиента ООО Ромашка"<br>❓ "Что ты умеешь?"</div>
            </div>
        </div>
        <div class="ai-quick-buttons">
            <button class="ai-quick-btn" onclick="sendAIModalMessage('Сколько стоит разработка телеграм-бота?')">🤖 Цена бота</button>
            <button class="ai-quick-btn" onclick="sendAIModalMessage('Создай клиента ООО Ромашка +7 999 123-45-67')">➕ Клиент</button>
            <button class="ai-quick-btn" onclick="sendAIModalMessage('Что ты умеешь?')">❓ Помощь</button>
        </div>
        <div class="ai-modal-input">
            <input type="text" id="aiModalInput" placeholder="Напишите сообщение..." onkeypress="if(event.keyCode===13) sendAIModalMessage()">
            <button onclick="sendAIModalMessage()"><i class="fas fa-paper-plane"></i> Отправить</button>
        </div>
    </div>
</div>

<script>
let aiModalTyping = false;

function openAIModal() {
    document.getElementById('aiModalOverlay').style.display = 'flex';
    document.getElementById('aiModalInput').focus();
}

function closeAIModal() {
    document.getElementById('aiModalOverlay').style.display = 'none';
}

async function sendAIModalMessage(quickMsg) {
    const input = document.getElementById('aiModalInput');
    const message = quickMsg || input.value.trim();
    if (!message) return;
    
    if (!quickMsg) input.value = '';
    addAIModalMessage('user', message);
    showAIModalTyping();
    
    try {
        const response = await fetch('/api/ai/universal/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        });
        const data = await response.json();
        hideAIModalTyping();
        addAIModalMessage('assistant', data.response || 'Извините, ошибка. Попробуйте позже.');
    } catch(err) {
        hideAIModalTyping();
        addAIModalMessage('assistant', '❌ Ошибка соединения');
    }
}

function addAIModalMessage(role, text) {
    const container = document.getElementById('aiModalMessages');
    const msgDiv = document.createElement('div');
    msgDiv.className = `ai-msg ${role}`;
    const avatar = role === 'user' ? '👤' : '🤖';
    const avatarBg = role === 'user' ? 'linear-gradient(135deg,#667eea,#764ba2)' : 'linear-gradient(135deg,#10b981,#059669)';
    msgDiv.innerHTML = `<div class="ai-msg-avatar" style="background:${avatarBg}">${avatar}</div><div class="ai-msg-content">${text.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div>`;
    container.appendChild(msgDiv);
    container.scrollTop = container.scrollHeight;
}

function showAIModalTyping() {
    if (aiModalTyping) return;
    aiModalTyping = true;
    const container = document.getElementById('aiModalMessages');
    const typingDiv = document.createElement('div');
    typingDiv.className = 'ai-msg assistant';
    typingDiv.id = 'aiModalTyping';
    typingDiv.innerHTML = `<div class="ai-msg-avatar" style="background:linear-gradient(135deg,#10b981,#059669)">🤖</div><div class="ai-typing"><span></span><span></span><span></span></div>`;
    container.appendChild(typingDiv);
    container.scrollTop = container.scrollHeight;
}

function hideAIModalTyping() {
    const typingDiv = document.getElementById('aiModalTyping');
    if (typingDiv) typingDiv.remove();
    aiModalTyping = false;
}
</script>
