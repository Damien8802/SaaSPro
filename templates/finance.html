<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCore | Финансовый учёт</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #0f0f35 50%, #1a1a4a 100%);
            min-height: 100vh;
            position: relative;
        }
        
        /* Анимированный фон */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(102,126,234,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(118,75,162,0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* Премиум хедер */
        .header {
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 32px;
            padding: 40px;
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc, #c4b5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }
        
        .header h1 i {
            background: none;
            -webkit-background-clip: unset;
            color: #667eea;
            margin-right: 12px;
        }
        
        .header p {
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            position: relative;
            z-index: 1;
        }
        
        /* Навигация */
        .navbar {
            background: rgba(15, 25, 35, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc, #c4b5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-decoration: none;
        }
        .navbar-brand i { background: none; color: #667eea; margin-right: 8px; }
        .nav-link {
            color: rgba(255,255,255,0.7);
            transition: all 0.3s;
            margin: 0 5px;
            border-radius: 12px;
            padding: 8px 16px;
            text-decoration: none;
            font-size: 13px;
            display: inline-block;
        }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(102,126,234,0.2); }
        .nav-link i { margin-right: 8px; }
        
        /* Карточки статистики (как на reports) */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 20px 24px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .stat-card:hover {
            background: rgba(102,126,234,0.1);
            border-color: #667eea;
            transform: translateY(-4px);
        }

        .stat-card-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .stat-card .stat-icon {
            width: 52px;
            height: 52px;
            background: rgba(102,126,234,0.15);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin: 0;
        }

        .stat-info h3 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stat-info p {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin: 4px 0 0 0;
        }

        .stat-card .bi-chevron-right {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .stat-card:hover .bi-chevron-right {
            color: #667eea;
            transform: translateY(-50%) translateX(4px);
        }
        
        /* Карточка с платежами */
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
        }
        
        .card h3 {
            color: #fff;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        .card h3 i {
            margin-right: 10px;
            color: #667eea;
        }
        
        /* Таблица */
        .table {
            color: #e2e8f0;
            margin-bottom: 0;
        }
        
        .table thead th {
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            font-weight: 600;
            padding: 15px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .table tbody td {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 15px;
            vertical-align: middle;
        }
        
        .table tbody tr:hover {
            background: rgba(255,255,255,0.03);
        }
        
        .status-completed {
            background: rgba(16,185,129,0.2);
            color: #10b981;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        
        .status-pending {
            background: rgba(245,158,11,0.2);
            color: #f59e0b;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        
        .amount {
            font-weight: 700;
            color: #a5b4fc;
        }
        
        /* Анимация загрузки */
        .skeleton-text {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        /* Адаптивность */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .stats-row { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .stat-card { padding: 16px; }
            .stat-card .stat-icon { width: 45px; height: 45px; font-size: 20px; }
            .stat-info h3 { font-size: 20px; }
        }
        @media (max-width: 480px) {
            .stats-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container-fluid" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap;">
        <a class="navbar-brand" href="/"><i class="bi bi-rocket-takeoff-fill"></i> SaaSPro</a>
        <div class="d-flex flex-wrap gap-2">
            <a href="/dashboard-improved" class="nav-link"><i class="bi bi-speedometer2"></i> Главная</a>
            <a href="/finance" class="nav-link active"><i class="bi bi-calculator"></i> Финансы</a>
            <a href="/reports" class="nav-link"><i class="bi bi-graph-up"></i> Отчёты</a>
            <a href="/reconciliation-acts" class="nav-link"><i class="bi bi-file-text"></i> Акты сверки</a>
            <a href="/journal" class="nav-link"><i class="bi bi-journal"></i> Журнал</a>
            <a href="/management" class="nav-link"><i class="bi bi-tags"></i> Управленка</a>
            <a href="/bank" class="nav-link"><i class="bi bi-bank"></i> Банк</a>
            <a href="/payroll" class="nav-link"><i class="bi bi-calculator-fill"></i> Зарплата</a>
            <a href="/tax-reports" class="nav-link"><i class="bi bi-file-earmark-spreadsheet"></i> Налоги</a>
            <a href="/import-excel" class="nav-link"><i class="bi bi-file-excel"></i> Импорт</a>
            <a href="/month-end" class="nav-link"><i class="bi bi-calendar-check"></i> Закрытие</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-chart-line"></i> FinCore</h1>
        <p class="mb-0">Управление финансами и отчётами в реальном времени</p>
    </div>
    
    <!-- Карточки статистики -->
    <div class="stats-row">
        <div class="stat-card" onclick="refreshFinanceData()">
            <div class="stat-card-left">
                <div class="stat-icon"><i class="fas fa-arrow-up"></i></div>
                <div class="stat-info">
                    <h3 id="totalIncome">0 ₽</h3>
                    <p>Доход</p>
                </div>
            </div>
            <i class="bi bi-chevron-right"></i>
        </div>
        <div class="stat-card" onclick="refreshFinanceData()">
            <div class="stat-card-left">
                <div class="stat-icon"><i class="fas fa-arrow-down"></i></div>
                <div class="stat-info">
                    <h3 id="totalExpenses">0 ₽</h3>
                    <p>Расходы</p>
                </div>
            </div>
            <i class="bi bi-chevron-right"></i>
        </div>
        <div class="stat-card" onclick="refreshFinanceData()">
            <div class="stat-card-left">
                <div class="stat-icon"><i class="fas fa-chart-simple"></i></div>
                <div class="stat-info">
                    <h3 id="totalProfit">0 ₽</h3>
                    <p>Прибыль</p>
                </div>
            </div>
            <i class="bi bi-chevron-right"></i>
        </div>
        <div class="stat-card" onclick="refreshFinanceData()">
            <div class="stat-card-left">
                <div class="stat-icon"><i class="fas fa-credit-card"></i></div>
                <div class="stat-info">
                    <h3 id="totalPayments">0</h3>
                    <p>Платежей</p>
                </div>
            </div>
            <i class="bi bi-chevron-right"></i>
        </div>
    </div>
    
    <div class="card">
        <h3><i class="fas fa-clock"></i> Последние платежи</h3>
        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Сумма</th>
                        <th>Статус</th>
                        <th>Дата</th>
                        <th>Тариф</th>
                    </tr>
                </thead>
                <tbody id="paymentsTable">
                    <tr>
                        <td colspan="5" class="text-center">
                            <div class="skeleton-text" style="width: 200px; margin: 0 auto; padding: 10px;">Загрузка...</div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
// Загрузка статистики платежей
function refreshFinanceData() {
    fetch('/api/admin/payment-stats')
        .then(function(r) { return r.json(); })
        .then(function(d) {
            var totalIncome = d.total_amount || 0;
            var paymentsCount = d.payments_count || 0;
            
            document.getElementById('totalIncome').innerHTML = totalIncome.toLocaleString() + ' ₽';
            document.getElementById('totalPayments').innerHTML = paymentsCount;
            document.getElementById('totalExpenses').innerHTML = '0 ₽';
            document.getElementById('totalProfit').innerHTML = totalIncome.toLocaleString() + ' ₽';
        })
        .catch(function(e) {
            console.error('Ошибка загрузки статистики:', e);
            document.getElementById('totalIncome').innerHTML = '0 ₽';
            document.getElementById('totalPayments').innerHTML = '0';
        });
}

// Загрузка последних платежей
function loadRecentPayments() {
    fetch('/api/admin/payments/recent?limit=10')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var tbody = document.getElementById('paymentsTable');
            if (data.payments && data.payments.length > 0) {
                var html = '';
                for (var i = 0; i < data.payments.length; i++) {
                    var p = data.payments[i];
                    var statusClass = (p.status === 'completed') ? 'status-completed' : 'status-pending';
                    var statusText = (p.status === 'completed') ? 'Оплачен' : 'Ожидание';
                    var date = p.created_at ? new Date(p.created_at).toLocaleDateString('ru-RU') : '—';
                    var amount = (p.amount || 0).toLocaleString();
                    var idShort = p.id ? p.id.slice(0, 8) : '—';
                    var planName = p.plan_name || '—';
                    
                    html = html + '<tr>' +
                        '<td><code>' + idShort + '</code></td>' +
                        '<td class="amount">' + amount + ' ₽</td>' +
                        '<td><span class="' + statusClass + '">' + statusText + '</span></td>' +
                        '<td>' + date + '</td>' +
                        '<td>' + planName + '</td>' +
                        '</tr>';
                }
                tbody.innerHTML = html;
            } else {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center">Нет платежей</td><\/tr>';
            }
        })
        .catch(function(e) {
            console.error('Ошибка загрузки платежей:', e);
            document.getElementById('paymentsTable').innerHTML = '<tr><td colspan="5" class="text-center">Ошибка загрузки данных</td><\/tr>';
        });
}

// Вызов функций
refreshFinanceData();
loadRecentPayments();
setInterval(loadRecentPayments, 30000);
</script>
</body>
</html>
