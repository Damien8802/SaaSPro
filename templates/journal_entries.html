<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">`n    `n    `n    `n    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinCore — Журнал проводок</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            min-height: 100vh;
        }
        .hero-section {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            padding: 40px 0 60px 0;
            border-bottom: 1px solid rgba(99,102,241,0.2);
        }
        .premium-card {
            background: rgba(30, 30, 46, 0.95);
            border-radius: 24px;
            border: 1px solid rgba(99,102,241,0.2);
            overflow: hidden;
        }
        .stat-value {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99,102,241,0.5);
            color: white;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(99,102,241,0.5);
            color: #a78bfa;
            padding: 10px 24px;
            border-radius: 40px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-outline:hover {
            background: rgba(99,102,241,0.1);
            color: white;
        }
        .journal-table {
            width: 100%;
            border-collapse: collapse;
        }
        .journal-table thead th {
            background: rgba(30, 30, 46, 0.8);
            padding: 14px 16px;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #a78bfa;
            border-bottom: 1px solid rgba(99,102,241,0.3);
        }
        .journal-table tbody tr {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }
        .journal-table tbody tr:hover {
            background: rgba(99,102,241,0.08);
        }
        .journal-table tbody td {
            padding: 14px 16px;
            color: #e2e8f0;
            font-size: 0.85rem;
        }
        .badge-debit {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.75rem;
        }
        .badge-credit {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.75rem;
        }
        .form-control, .form-select {
            background: rgba(30,30,46,0.9);
            border: 1px solid rgba(99,102,241,0.3);
            color: white;
            border-radius: 12px;
            padding: 10px 14px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(30,30,46,1);
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
            color: white;
        }
        .form-control::placeholder {
            color: #64748b;
        }
        .modal-content {
            background: #1e1e2e;
            border: 1px solid rgba(99,102,241,0.3);
            border-radius: 24px;
        }
        .modal-header {
            border-bottom-color: rgba(99,102,241,0.2);
        }
        .modal-footer {
            border-top-color: rgba(99,102,241,0.2);
        }
        .delete-btn {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            transition: all 0.2s;
        }
        .delete-btn:hover {
            color: #ff5555;
            transform: scale(1.1);
        }
        .edit-btn {
            background: transparent;
            border: none;
            color: #f59e0b;
            cursor: pointer;
            margin-right: 8px;
            transition: all 0.2s;
        }
        .edit-btn:hover {
            color: #ffbb33;
            transform: scale(1.1);
        }
        @media (max-width: 768px) {
            .journal-table thead th, .journal-table tbody td {
                padding: 8px 10px;
                font-size: 0.7rem;
            }
            .stat-value { font-size: 24px; }
        }
    </style>
</head>
<body>

<div class="hero-section">
    <div class="container" style="max-width: 1600px; margin: 0 auto; padding: 0 20px;">
        <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <div class="d-flex align-items-center gap-3 mb-2">
                    <div style="width: 50px; height: 50px; background: linear-gradient(135deg, #6366f1, #8b5cf6); border-radius: 16px; display: flex; align-items: center; justify-content: center;">
                        <i class="fas fa-scroll" style="font-size: 24px; color: white;"></i>
                    </div>
                    <div>
                        <h1 style="font-size: 28px; font-weight: 800; color: white;">Журнал проводок</h1>
                        <p style="color: #94a3b8; margin-top: 4px;">Бухгалтерские проводки и финансовые операции</p>

            <div class="d-flex gap-3">
                <button class="btn-gradient" data-bs-toggle="modal" data-bs-target="#addEntryModal">
                    <i class="fas fa-plus"></i> Новая проводка
                </button>
                <button onclick="loadEntries()" class="btn-outline">
                    <i class="fas fa-sync-alt"></i> Обновить
                </button>
                <a href="/dashboard-improved" class="btn-outline text-decoration-none">
                    <i class="fas fa-arrow-left"></i> Назад
                </a>
            </div>
        </div>
    </div>
</div>

<div class="container" style="max-width: 1600px; margin: -30px auto 40px; padding: 0 20px;">
    <!-- Статистика -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="premium-card p-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 5px;">ВСЕГО ПРОВОДОК</p>

                    </div>
                    <i class="fas fa-chart-line" style="font-size: 32px; color: #6366f1; opacity: 0.7;"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="premium-card p-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 5px;">ДЕБЕТ</p>
                        <h2 class="stat-value" id="totalDebit" style="background: linear-gradient(135deg, #10b981, #34d399); -webkit-background-clip: text;">0 ₽</h2>
                    </div>
                    <i class="fas fa-arrow-trend-up" style="font-size: 32px; color: #10b981;"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="premium-card p-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 5px;">КРЕДИТ</p>
                        <h2 class="stat-value" id="totalCredit" style="background: linear-gradient(135deg, #ef4444, #f87171); -webkit-background-clip: text;">0 ₽</h2>
                    </div>
                    <i class="fas fa-arrow-trend-down" style="font-size: 32px; color: #ef4444;"></i>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="premium-card p-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <p style="color: #94a3b8; font-size: 0.8rem; margin-bottom: 5px;">БАЛАНС</p>
                        <h2 class="stat-value" id="balance">0 ₽</h2>
                    </div>
                    <i class="fas fa-scale-balanced" style="font-size: 32px; color: #a78bfa;"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Таблица -->
    <div class="premium-card">
        <div class="p-3 border-bottom" style="border-color: rgba(99,102,241,0.15);">
            <div class="d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center gap-2">
                    <i class="fas fa-list-ul" style="color: #6366f1;"></i>
                    <h3 style="font-size: 16px; font-weight: 600; margin: 0; color: white;">Все проводки</h3>
                </div>
                <span style="font-size: 11px; color: #64748b;" id="lastUpdate">—</span>
            </div>
        </div>
        <div style="overflow-x: auto;">
            <table class="journal-table">
                <thead>
                    <tr>
                        <th>Дата</th>
                        <th>№ документа</th>
                        <th>Тип</th>
                        <th>Контрагент</th>
                        <th>ИНН</th>
                        <th>Дебет</th>
                        <th>Кредит</th>
                        <th>Описание</th>
                        <th style="width: 80px;">Действия</th>
                    </tr>
                </thead>
                <tbody id="entriesTable">
                    <tr><td colspan="9" style="text-align: center; padding: 60px;"><i class="fas fa-spinner fa-spin"></i> Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Модальное окно добавления -->
<div class="modal fade" id="addEntryModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-plus-circle me-2"></i>Новая проводка</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Дата операции</label>
                        <input type="date" class="form-control" id="new_operation_date" value="2026-05-11">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">№ документа</label>
                        <input type="text" class="form-control" id="new_document_number" placeholder="СЧ-001">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Тип документа</label>
                        <select class="form-select" id="new_document_type">
                            <option value="Счет">Счет</option>
                            <option value="Акт">Акт</option>
                            <option value="Накладная">Накладная</option>
                            <option value="Платеж">Платеж</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Контрагент</label>
                        <input type="text" class="form-control" id="new_counterparty_name" placeholder="ООО Ромашка">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">ИНН контрагента</label>
                        <input type="text" class="form-control" id="new_counterparty_inn" placeholder="1234567890">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Сумма дебета (₽)</label>
                        <input type="number" class="form-control" id="new_debit_amount" value="0" step="0.01">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Сумма кредита (₽)</label>
                        <input type="number" class="form-control" id="new_credit_amount" value="0" step="0.01">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Описание</label>
                        <textarea class="form-control" id="new_description" rows="2" placeholder="Описание операции..."></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-outline" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn-gradient" onclick="createEntry()">Создать проводку</button>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно редактирования -->
<div class="modal fade" id="editEntryModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-edit me-2"></i>Редактирование проводки</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit_entry_id">
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label">Дата операции</label>
                        <input type="date" class="form-control" id="edit_operation_date">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">№ документа</label>
                        <input type="text" class="form-control" id="edit_document_number">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Тип документа</label>
                        <select class="form-select" id="edit_document_type">
                            <option value="Счет">Счет</option>
                            <option value="Акт">Акт</option>
                            <option value="Накладная">Накладная</option>
                            <option value="Платеж">Платеж</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Контрагент</label>
                        <input type="text" class="form-control" id="edit_counterparty_name">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">ИНН контрагента</label>
                        <input type="text" class="form-control" id="edit_counterparty_inn">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Сумма дебета (₽)</label>
                        <input type="number" class="form-control" id="edit_debit_amount" step="0.01">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Сумма кредита (₽)</label>
                        <input type="number" class="form-control" id="edit_credit_amount" step="0.01">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Описание</label>
                        <textarea class="form-control" id="edit_description" rows="2"></textarea>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-outline" data-bs-dismiss="modal">Отмена</button>
                <button type="button" class="btn-gradient" onclick="updateEntry()">Сохранить изменения</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentEditId = null;

    async function loadEntries() {
        try {
            const response = await fetch('/api/journal-entries');
            const data = await response.json();
            const entries = data.entries || [];
            
            document.getElementById('totalCount').innerText = entries.length;
            document.getElementById('lastUpdate').innerHTML = `<i class="far fa-clock"></i> ${new Date().toLocaleString('ru-RU')}`;
            
            let totalDebit = 0, totalCredit = 0;
            let tbody = document.getElementById('entriesTable');
            
            if (entries.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 60px;"><i class="fas fa-inbox" style="font-size: 48px; color: #475569;"></i><p style="color: #64748b; margin-top: 16px;">Нет проводок. Создайте первую!</p></td></tr>';
                document.getElementById('totalDebit').innerHTML = '0 ₽';
                document.getElementById('totalCredit').innerHTML = '0 ₽';
                document.getElementById('balance').innerHTML = '0 ₽';
                return;
            }
            
            let html = '';
            for (let e of entries) {
                let debit = e.debit_amount || 0;
                let credit = e.credit_amount || 0;
                totalDebit += debit;
                totalCredit += credit;
                
                html += `
                    <tr>
                        <td>${e.operation_date || '-'}</td>
                        <td><code style="background: rgba(99,102,241,0.15); padding: 4px 8px; border-radius: 6px;">${e.document_number || '-'}</code></td>
                        <td><span style="background: rgba(99,102,241,0.15); color: #a78bfa; padding: 4px 10px; border-radius: 20px; font-size: 11px;">${e.document_type || '-'}</span></td>
                        <td>${e.counterparty_name || '-'}</td>
                        <td style="font-family: monospace;">${e.counterparty_inn || '-'}</td>
                        <td>${debit > 0 ? `<span class="badge-debit">${debit.toLocaleString()} ₽</span>` : '—'}</td>
                        <td>${credit > 0 ? `<span class="badge-credit">${credit.toLocaleString()} ₽</span>` : '—'}</td>
                        <td style="max-width: 250px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${e.description || '-'}</td>
                        <td>
                            <button class="edit-btn" onclick="openEditModal('${e.id}')"><i class="fas fa-edit"></i></button>
                            <button class="delete-btn" onclick="deleteEntry('${e.id}')"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            }
            
            tbody.innerHTML = html;
            document.getElementById('totalDebit').innerHTML = totalDebit.toLocaleString() + ' ₽';
            document.getElementById('totalCredit').innerHTML = totalCredit.toLocaleString() + ' ₽';
            document.getElementById('balance').innerHTML = (totalDebit - totalCredit).toLocaleString() + ' ₽';
            
        } catch (error) {
            console.error('Ошибка:', error);
            document.getElementById('entriesTable').innerHTML = '<tr><td colspan="9" style="text-align: center; padding: 60px; color: #ef4444;">❌ Ошибка загрузки</td></tr>';
        }
    }
    
    async function createEntry() {
        const entry = {
            operation_date: document.getElementById('new_operation_date').value,
            document_number: document.getElementById('new_document_number').value,
            document_type: document.getElementById('new_document_type').value,
            counterparty_name: document.getElementById('new_counterparty_name').value,
            counterparty_inn: document.getElementById('new_counterparty_inn').value,
            debit_amount: parseFloat(document.getElementById('new_debit_amount').value) || 0,
            credit_amount: parseFloat(document.getElementById('new_credit_amount').value) || 0,
            description: document.getElementById('new_description').value
        };
        
        if (!entry.document_number) {
            alert('Введите номер документа');
            return;
        }
        
        try {
            const response = await fetch('/api/journal-entries', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(entry)
            });
            
            if (response.ok) {
                bootstrap.Modal.getInstance(document.getElementById('addEntryModal')).hide();
                document.getElementById('new_document_number').value = '';
                document.getElementById('new_counterparty_name').value = '';
                document.getElementById('new_counterparty_inn').value = '';
                document.getElementById('new_debit_amount').value = '0';
                document.getElementById('new_credit_amount').value = '0';
                document.getElementById('new_description').value = '';
                loadEntries();
            } else {
                const error = await response.json();
                alert('Ошибка: ' + (error.error || 'Не удалось создать проводку'));
            }
        } catch (error) {
            alert('Ошибка: ' + error.message);
        }
    }
    
    async function openEditModal(id) {
        try {
            const response = await fetch(`/api/journal-entries/${id}`);
            const data = await response.json();
            const entry = data.entry;
            
            document.getElementById('edit_entry_id').value = id;
            document.getElementById('edit_operation_date').value = entry.operation_date || '';
            document.getElementById('edit_document_number').value = entry.document_number || '';
            document.getElementById('edit_document_type').value = entry.document_type || 'Счет';
            document.getElementById('edit_counterparty_name').value = entry.counterparty_name || '';
            document.getElementById('edit_counterparty_inn').value = entry.counterparty_inn || '';
            document.getElementById('edit_debit_amount').value = entry.debit_amount || 0;
            document.getElementById('edit_credit_amount').value = entry.credit_amount || 0;
            document.getElementById('edit_description').value = entry.description || '';
            
            new bootstrap.Modal(document.getElementById('editEntryModal')).show();
        } catch (error) {
            alert('Ошибка загрузки данных: ' + error.message);
        }
    }
    
    async function updateEntry() {
        const id = document.getElementById('edit_entry_id').value;
        const entry = {
            operation_date: document.getElementById('edit_operation_date').value,
            document_number: document.getElementById('edit_document_number').value,
            document_type: document.getElementById('edit_document_type').value,
            counterparty_name: document.getElementById('edit_counterparty_name').value,
            counterparty_inn: document.getElementById('edit_counterparty_inn').value,
            debit_amount: parseFloat(document.getElementById('edit_debit_amount').value) || 0,
            credit_amount: parseFloat(document.getElementById('edit_credit_amount').value) || 0,
            description: document.getElementById('edit_description').value
        };
        
        try {
            const response = await fetch(`/api/journal-entries/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(entry)
            });
            
            if (response.ok) {
                bootstrap.Modal.getInstance(document.getElementById('editEntryModal')).hide();
                loadEntries();
            } else {
                const error = await response.json();
                alert('Ошибка: ' + (error.error || 'Не удалось обновить'));
            }
        } catch (error) {
            alert('Ошибка: ' + error.message);
        }
    }
    
    async function deleteEntry(id) {
        if (!confirm('Удалить эту проводку?')) return;
        
        try {
            const response = await fetch(`/api/journal-entries/${id}`, { method: 'DELETE' });
            if (response.ok) {
                loadEntries();
            } else {
                alert('Ошибка при удалении');
            }
        } catch (error) {
            alert('Ошибка: ' + error.message);
        }
    }
    
    loadEntries();
    setInterval(loadEntries, 60000);
</script>

<script>
    // Принудительная привязка кнопки после загрузки страницы
    document.addEventListener('DOMContentLoaded', function() {
        // Находим все кнопки с текстом "Обновить"
        const btns = document.querySelectorAll('.btn-outline');
        for (let btn of btns) {
            if (btn.innerText.includes('Обновить') || btn.innerHTML.includes('sync-alt')) {
                btn.onclick = function(e) {
                    e.preventDefault();
                    console.log('🔄 Кнопка нажата, обновляем...');
