<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика | TeamSphere</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
        }
        
        .animated-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .animated-bg::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102,126,234,0.3) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .navbar {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .navbar-brand {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-btn {
            display: inline-block;
            padding: 8px 20px;
            margin: 0 5px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            color: #4a5568;
        }
        .nav-btn:hover, .nav-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            transform: translateY(-2px);
        }
        
        .hero {
            text-align: center;
            padding: 40px 20px;
            color: white;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 800;
        }
        .hero h1 i {
            font-size: 2rem;
            margin-right: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: #fff;
        }
        
        .stat-label {
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
            margin-top: 8px;
        }
        
        .stat-change {
            font-size: 0.8rem;
            margin-top: 8px;
        }
        
        .stat-change.positive { color: #4ade80; }
        .stat-change.negative { color: #f87171; }
        
        .chart-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .chart-title {
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        canvas {
            max-height: 280px;
        }
        
        .filter-bar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 15px 20px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .filter-bar select, .filter-bar input {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 30px;
            padding: 8px 16px;
            color: white;
            outline: none;
        }
        
        .filter-bar button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 30px;
            padding: 8px 24px;
            color: white;
            font-weight: 500;
            transition: 0.3s;
        }
        
        .filter-bar button:hover {
            transform: translateY(-2px);
        }
        
        .btn-back {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            z-index: 1000;
        }
        
        .btn-back:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #764ba2, #667eea);
            color: white;
        }
        
        .btn-export {
            position: fixed;
            bottom: 30px;
            right: 140px;
            background: rgba(255,255,255,0.2);
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.3s;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.3);
        }
        
        .btn-export:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
            color: white;
        }
        
        @media (max-width: 768px) {
            .hero h1 { font-size: 1.8rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .btn-export { right: 110px; padding: 8px 16px; font-size: 12px; }
            .btn-back { padding: 8px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="container">
        <a class="navbar-brand" href="/teamsphere"><i class="fas fa-globe me-2"></i>TeamSphere</a>
        <div class="d-flex">
            <a href="/teamsphere" class="nav-btn"><i class="fas fa-home"></i> Главная</a>
            <a href="/crm" class="nav-btn"><i class="fas fa-users"></i> CRM</a>
            <a href="/projects" class="nav-btn"><i class="fas fa-tasks"></i> Проекты</a>
            <a href="/team/team" class="nav-btn"><i class="fas fa-user-friends"></i> Команда</a>
            <a href="/tasks" class="nav-btn"><i class="fas fa-check-square"></i> Задачи</a>
            <a href="/chat" class="nav-btn"><i class="fas fa-comments"></i> Чат</a>
            <a href="/team-calendar" class="nav-btn"><i class="fas fa-calendar-alt"></i> Календарь</a>
            <a href="/team-analytics" class="nav-btn active"><i class="fas fa-chart-line"></i> Аналитика</a>
            <a href="/swagger/index.html" class="nav-btn"><i class="fas fa-book"></i> API</a>
        </div>
    </div>
</nav>




<div class="animated-bg"></div>

<div class="hero">
    <h1><i class="fas fa-chart-line"></i> Аналитика TeamSphere</h1>
</div>

<div class="container">
    <!-- Фильтры -->
    <div class="filter-bar">
        <i class="fas fa-filter text-white"></i>
        <select id="periodSelect">
            <option value="week">За неделю</option>
            <option value="month" selected>За месяц</option>
            <option value="quarter">За квартал</option>
            <option value="year">За год</option>
        </select>
        <input type="date" id="dateFrom" placeholder="С">
        <input type="date" id="dateTo" placeholder="По">
        <button onclick="updateAnalytics()">Применить</button>
    </div>

    <!-- Статистика -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <div class="stat-number" id="totalTasks">0</div>
            <div class="stat-label">Всего задач</div>
            <div class="stat-change positive" id="tasksChange">+0%</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="completedTasks">0</div>
            <div class="stat-label">Выполнено</div>
            <div class="stat-change positive" id="completedChange">+0%</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="completionRate">0%</div>
            <div class="stat-label">Выполнение</div>
            <div class="stat-change positive" id="rateChange">+0%</div>
        </div>
        <div class="stat-card">
            <div class="stat-number" id="avgCompletionTime">0</div>
            <div class="stat-label">Ср. время (дни)</div>
            <div class="stat-change negative" id="timeChange">-0%</div>
        </div>
    </div>

    <!-- Графики -->
    <div class="row">
        <div class="col-md-6">
            <div class="chart-card">
                <div class="chart-title"><i class="fas fa-chart-line"></i> Динамика выполнения задач</div>
                <canvas id="tasksChart"></canvas>
            </div>
        </div>
        <div class="col-md-6">
            <div class="chart-card">
                <div class="chart-title"><i class="fas fa-chart-pie"></i> Распределение по приоритетам</div>
                <canvas id="priorityChart"></canvas>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <div class="chart-card">
                <div class="chart-title"><i class="fas fa-users"></i> KPI команды</div>
                <canvas id="teamKPIChart"></canvas>
            </div>
        </div>
        <div class="col-md-6">
            <div class="chart-card">
                <div class="chart-title"><i class="fas fa-calendar-week"></i> Активность по дням</div>
                <canvas id="activityChart"></canvas>
            </div>
        </div>
    </div>
</div>

<button class="btn-export" onclick="exportAnalytics()"><i class="fas fa-download"></i> Экспорт</button>
<a href="javascript:history.back()" class="btn-back"><i class="fas fa-arrow-left"></i> Назад</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let tasksChart, priorityChart, teamKPIChart, activityChart;
    
    // Загрузка задач из localStorage
    function getTasks() {
        const saved = localStorage.getItem('teamsphere_tasks');
        if (saved) {
            return JSON.parse(saved);
        }
        return [
            {id:1, title:"Задача 1", completed:true, priority:"high", createdAt:"2026-03-20", completedAt:"2026-03-22", assignee:"Алексей"},
            {id:2, title:"Задача 2", completed:true, priority:"medium", createdAt:"2026-03-21", completedAt:"2026-03-23", assignee:"Мария"},
            {id:3, title:"Задача 3", completed:false, priority:"high", createdAt:"2026-03-22", assignee:"Алексей"},
            {id:4, title:"Задача 4", completed:true, priority:"low", createdAt:"2026-03-23", completedAt:"2026-03-24", assignee:"Дмитрий"},
            {id:5, title:"Задача 5", completed:false, priority:"medium", createdAt:"2026-03-24", assignee:"Мария"}
        ];
    }
    
    function updateAnalytics() {
        const tasks = getTasks();
        const period = document.getElementById('periodSelect').value;
        
        // Фильтрация по дате
        let filteredTasks = [...tasks];
        const from = document.getElementById('dateFrom').value;
        const to = document.getElementById('dateTo').value;
        
        if (from) {
            filteredTasks = filteredTasks.filter(t => t.createdAt >= from);
        }
        if (to) {
            filteredTasks = filteredTasks.filter(t => t.createdAt <= to);
        }
        
        // Статистика
        const total = filteredTasks.length;
        const completed = filteredTasks.filter(t => t.completed).length;
        const completionRate = total > 0 ? Math.round(completed / total * 100) : 0;
        
        const completedTasksList = filteredTasks.filter(t => t.completed && t.completedAt);
        const avgTime = completedTasksList.length > 0 
            ? Math.round(completedTasksList.reduce((sum, t) => {
                const created = new Date(t.createdAt);
                const completed = new Date(t.completedAt);
                return sum + (completed - created) / (1000 * 60 * 60 * 24);
            }, 0) / completedTasksList.length)
            : 0;
        
        document.getElementById('totalTasks').textContent = total;
        document.getElementById('completedTasks').textContent = completed;
        document.getElementById('completionRate').textContent = completionRate + '%';
        document.getElementById('avgCompletionTime').textContent = avgTime;
        
        // Динамика по дням
        const last7Days = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            last7Days.push(d.toISOString().split('T')[0]);
        }
        
        const dailyData = last7Days.map(date => ({
            date: date,
            created: filteredTasks.filter(t => t.createdAt === date).length,
            completed: filteredTasks.filter(t => t.completedAt === date).length
        }));
        
        if (tasksChart) tasksChart.destroy();
        const ctx1 = document.getElementById('tasksChart').getContext('2d');
        tasksChart = new Chart(ctx1, {
            type: 'line',
            data: {
                labels: dailyData.map(d => d.date.slice(5)),
                datasets: [
                    { label: 'Создано', data: dailyData.map(d => d.created), borderColor: '#667eea', backgroundColor: 'rgba(102,126,234,0.1)', tension: 0.4, fill: true },
                    { label: 'Выполнено', data: dailyData.map(d => d.completed), borderColor: '#4ade80', backgroundColor: 'rgba(74,222,128,0.1)', tension: 0.4, fill: true }
                ]
            },
            options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } }
        });
        
        // Приоритеты
        const priorityData = {
            high: filteredTasks.filter(t => t.priority === 'high').length,
            medium: filteredTasks.filter(t => t.priority === 'medium').length,
            low: filteredTasks.filter(t => t.priority === 'low').length
        };
        
        if (priorityChart) priorityChart.destroy();
        const ctx2 = document.getElementById('priorityChart').getContext('2d');
        priorityChart = new Chart(ctx2, {
            type: 'doughnut',
            data: {
                labels: ['Высокий', 'Средний', 'Низкий'],
                datasets: [{ data: [priorityData.high, priorityData.medium, priorityData.low], backgroundColor: ['#f87171', '#fbbf24', '#4ade80'] }]
            },
            options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } } }
        });
        
        // KPI команды
        const assignees = [...new Set(filteredTasks.map(t => t.assignee).filter(a => a))];
        const kpiData = assignees.map(assignee => ({
            assignee,
            total: filteredTasks.filter(t => t.assignee === assignee).length,
            completed: filteredTasks.filter(t => t.assignee === assignee && t.completed).length
        }));
        
        if (teamKPIChart) teamKPIChart.destroy();
        const ctx3 = document.getElementById('teamKPIChart').getContext('2d');
        teamKPIChart = new Chart(ctx3, {
            type: 'bar',
            data: {
                labels: kpiData.map(d => d.assignee),
                datasets: [
                    { label: 'Всего задач', data: kpiData.map(d => d.total), backgroundColor: '#667eea' },
                    { label: 'Выполнено', data: kpiData.map(d => d.completed), backgroundColor: '#4ade80' }
                ]
            },
            options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } }
        });
        
        // Активность
        const activityData = last7Days.map(date => ({
            date: date.slice(5),
            count: filteredTasks.filter(t => t.createdAt === date || t.completedAt === date).length
        }));
        
        if (activityChart) activityChart.destroy();
        const ctx4 = document.getElementById('activityChart').getContext('2d');
        activityChart = new Chart(ctx4, {
            type: 'bar',
            data: {
                labels: activityData.map(d => d.date),
                datasets: [{ label: 'Активность', data: activityData.map(d => d.count), backgroundColor: '#8b5cf6', borderRadius: 8 }]
            },
            options: { responsive: true, plugins: { legend: { labels: { color: '#fff' } } }, scales: { y: { ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } }
        });
    }
    
    function exportAnalytics() {
        const tasks = getTasks();
        const total = tasks.length;
        const completed = tasks.filter(t => t.completed).length;
        const rate = total > 0 ? Math.round(completed / total * 100) : 0;
        
        const report = `TeamSphere Analytics Report\n` +
            `========================\n` +
            `Дата: ${new Date().toLocaleString()}\n` +
            `Всего задач: ${total}\n` +
            `Выполнено: ${completed}\n` +
            `Процент выполнения: ${rate}%\n` +
            `========================\n`;
        
        const blob = new Blob([report], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `analytics_${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
        URL.revokeObjectURL(url);
        
        alert('✅ Отчет экспортирован!');
    }
    
    updateAnalytics();
</script>
</body>
</html>
