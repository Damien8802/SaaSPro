<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управление заказами | SaaSPro Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            min-height: 100vh;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #1a1a2e;
            padding: 24px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: white;
        }

        .logo-sub {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: 12px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(99, 102, 241, 0.2);
            color: white;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: white;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-label {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: white;
        }

        /* Filters */
        .filters {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 10px 16px;
            background: #0f0f1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            cursor: pointer;
        }

        /* Orders Table */
        .orders-table {
            background: #1a1a2e;
            border-radius: 20px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        th {
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-pending { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .status-approved { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .status-in_progress { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .status-completed { background: rgba(139, 92, 246, 0.2); color: #a78bfa; }
        .status-cancelled { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .action-btn {
            padding: 6px 12px;
            background: rgba(99, 102, 241, 0.2);
            border: none;
            border-radius: 8px;
            color: #a5b4fc;
            cursor: pointer;
            font-size: 12px;
            margin: 0 4px;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: rgba(99, 102, 241, 0.4);
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
        }

        .modal-content h3 {
            color: white;
            margin-bottom: 20px;
        }

        .modal-select {
            width: 100%;
            padding: 12px;
            background: #0f0f1a;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-save {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            color: white;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="sidebar">
            <div class="logo">
                <div class="logo-icon">📊</div>
                <div>
                    <div class="logo-text">SaaSPro Admin</div>
                    <div class="logo-sub">Управление заказами</div>
                </div>
            </div>
            <a href="/admin" class="nav-item">📈 Главная</a>
            <a href="/admin/orders" class="nav-item active">📋 Заказы</a>
            <a href="/admin/users" class="nav-item">👥 Пользователи</a>
            <a href="/admin/subscriptions" class="nav-item">💳 Подписки</a>
        </div>

        <div class="main-content">
            <div class="header">
                <h1>📋 Управление заказами</h1>
                <button class="action-btn" onclick="refreshOrders()">🔄 Обновить</button>
            </div>

            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-label">Всего заказов</div>
                    <div class="stat-value" id="totalOrders">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">В обработке</div>
                    <div class="stat-value" id="pendingOrders">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">В работе</div>
                    <div class="stat-value" id="inProgressOrders">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Выполнено</div>
                    <div class="stat-value" id="completedOrders">0</div>
                </div>
            </div>

            <div class="filters">
                <select class="filter-select" id="statusFilter" onchange="loadOrders()">
                    <option value="all">Все статусы</option>
                    <option value="pending">В обработке</option>
                    <option value="approved">Одобрены</option>
                    <option value="in_progress">В работе</option>
                    <option value="completed">Выполнены</option>
                    <option value="cancelled">Отменены</option>
                </select>
            </div>

            <div class="orders-table">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Клиент</th>
                            <th>Услуга</th>
                            <th>Сумма</th>
                            <th>Статус</th>
                            <th>Дата</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody">
                        <tr><td colspan="7" style="text-align: center;">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Status Modal -->
    <div class="modal" id="statusModal">
        <div class="modal-content">
            <h3>Изменить статус заказа</h3>
            <select class="modal-select" id="newStatus">
                <option value="pending">⏳ В обработке</option>
                <option value="approved">✅ Одобрен</option>
                <option value="in_progress">🔧 В работе</option>
                <option value="completed">🎉 Выполнен</option>
                <option value="cancelled">❌ Отменён</option>
            </select>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn-save" onclick="updateStatus()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        let currentOrderId = null;

        async function loadOrders() {
            const status = document.getElementById('statusFilter').value;
            const url = status === 'all' ? '/api/admin/orders' : `/api/admin/orders?status=${status}`;
            
            try {
                const response = await fetch(url);
                const orders = await response.json();
                renderOrders(orders);
                updateStats(orders);
            } catch (err) {
                console.error(err);
                document.getElementById('ordersTableBody').innerHTML = '<tr><td colspan="7" style="text-align: center;">❌ Ошибка загрузки</td></tr>';
            }
        }

        function renderOrders(orders) {
            const tbody = document.getElementById('ordersTableBody');
            if (!orders.length) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center;">📭 Нет заказов</td></tr>';
                return;
            }

            tbody.innerHTML = orders.map(order => `
                <tr>
                    <td>#${order.id?.slice(0,8) || 'N/A'}</td>
                    <td>${order.client_name || '—'}</td>
                    <td>${order.service_name || '—'}</td>
                    <td>${order.estimated_price ? Number(order.estimated_price).toLocaleString() + ' ₽' : '—'}</td>
                    <td>${getStatusBadge(order.status)}</td>
                    <td>${order.created_at ? new Date(order.created_at).toLocaleDateString() : '—'}</td>
                    <td>
                        <button class="action-btn" onclick="openStatusModal('${order.id}')">📝 Статус</button>
                    </td>
                </tr>
            `).join('');
        }

        function getStatusBadge(status) {
            const statuses = {
                'pending': '<span class="status-badge status-pending">⏳ В обработке</span>',
                'approved': '<span class="status-badge status-approved">✅ Одобрен</span>',
                'in_progress': '<span class="status-badge status-in_progress">🔧 В работе</span>',
                'completed': '<span class="status-badge status-completed">🎉 Выполнен</span>',
                'cancelled': '<span class="status-badge status-cancelled">❌ Отменён</span>'
            };
            return statuses[status] || '<span class="status-badge status-pending">⏳ В обработке</span>';
        }

        function updateStats(orders) {
            const total = orders.length;
            const pending = orders.filter(o => o.status === 'pending').length;
            const inProgress = orders.filter(o => o.status === 'in_progress').length;
            const completed = orders.filter(o => o.status === 'completed').length;
            
            document.getElementById('totalOrders').textContent = total;
            document.getElementById('pendingOrders').textContent = pending;
            document.getElementById('inProgressOrders').textContent = inProgress;
            document.getElementById('completedOrders').textContent = completed;
        }

        function openStatusModal(orderId) {
            currentOrderId = orderId;
            document.getElementById('statusModal').style.display = 'flex';
        }

        async function updateStatus() {
            const newStatus = document.getElementById('newStatus').value;
            
            try {
                const response = await fetch(`/api/admin/orders/${currentOrderId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                
                if (response.ok) {
                    closeModal();
                    loadOrders();
                }
            } catch (err) {
                console.error(err);
            }
        }

        function closeModal() {
            document.getElementById('statusModal').style.display = 'none';
            currentOrderId = null;
        }

        function refreshOrders() {
            loadOrders();
        }

        loadOrders();
    </script>
<div class="ai-floating-widget">
    <div class="ai-widget-button" onclick="openAIAssistant()">
        🤖
        <div class="ai-widget-badge">●</div>
    </div>
    <div class="ai-widget-tooltip">💬 Спросить AI ассистента</div>
</div>
<script>
function openAIAssistant() {
    window.open('/ai-assistant', '_blank', 'width=500,height=700,left=' + (screen.width - 520) + ',top=100');
}
</script>
</body>
</html>
