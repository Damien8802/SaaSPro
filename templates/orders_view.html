<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaSPro | Админ-панель заявок</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        
        /* Анимированный фон */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }
        .bg-animation::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 80% 50%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            animation: float 15s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translate(-10%, -10%) rotate(0deg); }
            50% { transform: translate(10%, 10%) rotate(5deg); }
        }
        
        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 30px 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .header h1 {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        .header p { color: rgba(255, 255, 255, 0.6); }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            transition: all 0.3s;
            text-align: center;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #6366f1;
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.3);
        }
        .stat-number {
            font-size: 48px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stat-label { color: rgba(255, 255, 255, 0.6); font-size: 14px; margin-top: 8px; }
        
        .filters {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 16px 24px;
            margin-bottom: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        .filter-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-color: transparent;
        }
        
        .order-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            transition: all 0.3s;
            animation: fadeInUp 0.4s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .order-card:hover {
            transform: translateX(5px);
            border-color: #6366f1;
            box-shadow: 0 10px 30px -10px rgba(99, 102, 241, 0.3);
        }
        .order-card.new {
            border-left: 4px solid #f59e0b;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(245, 158, 11, 0.1));
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .badge {
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-new { background: linear-gradient(135deg, #f59e0b, #ea580c); color: white; }
        .badge-viewed { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid #34d399; }
        .order-date { color: rgba(255, 255, 255, 0.5); font-size: 13px; }
        
        .order-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
        }
        .info-icon {
            width: 40px;
            height: 40px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #a5b4fc;
        }
        .info-text { flex: 1; }
        .info-label { font-size: 11px; color: rgba(255, 255, 255, 0.5); text-transform: uppercase; letter-spacing: 1px; }
        .info-value { font-size: 15px; font-weight: 600; color: white; margin-top: 4px; }
        
        .order-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
        }
        .btn-action {
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-copy { background: rgba(255, 255, 255, 0.1); color: white; }
        .btn-copy:hover { background: #6366f1; transform: scale(1.02); }
        .btn-edit { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid #60a5fa; }
        .btn-edit:hover { background: #3b82f6; color: white; }
        .btn-delete { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid #f87171; }
        .btn-delete:hover { background: #ef4444; color: white; }
        .btn-view { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid #34d399; }
        .btn-view:hover { background: #10b981; color: white; }
        
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 30px -5px rgba(99, 102, 241, 0.5);
            transition: all 0.3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }
        .refresh-btn:hover { transform: scale(1.05); }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        .empty-icon { font-size: 80px; margin-bottom: 20px; opacity: 0.5; }
        .empty-state h3 { color: white; margin-bottom: 10px; }
        .empty-state p { color: rgba(255, 255, 255, 0.5); }
        
        /* Модальное окно */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px;
            max-width: 500px;
            width: 90%;
            border: 1px solid rgba(99, 102, 241, 0.3);
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-content h3 { color: white; margin-bottom: 24px; font-size: 24px; }
        .modal-content label { color: rgba(255,255,255,0.7); display: block; margin-bottom: 8px; font-size: 13px; }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 14px;
        }
        .modal-content input:focus, .modal-content textarea:focus {
            outline: none;
            border-color: #6366f1;
        }
        .modal-buttons { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
        .btn-save { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; }
        .btn-cancel { background: rgba(255,255,255,0.1); color: white; border: none; padding: 10px 24px; border-radius: 40px; cursor: pointer; }
        
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .info-item { flex-direction: column; text-align: center; }
            .info-icon { margin: 0 auto; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-crown me-3"></i> Админ-панель заявок</h1>
            <p><i class="fas fa-chart-line me-2"></i>Управление заявками на разработку | SaaSPro Premium</p>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div class="stat-label">Всего заявок</div></div>
            <div class="stat-card"><div class="stat-number" id="newCount">0</div><div class="stat-label"><i class="fas fa-bell"></i> Новые</div></div>
            <div class="stat-card"><div class="stat-number" id="viewedCount">0</div><div class="stat-label"><i class="fas fa-check-circle"></i> Просмотренные</div></div>
            <div class="stat-card"><div class="stat-number" id="todayCount">0</div><div class="stat-label"><i class="fas fa-calendar-day"></i> За сегодня</div></div>
        </div>
        
        <div class="filters">
            <button class="filter-btn active" onclick="filterOrders('all')">📋 Все заявки</button>
            <button class="filter-btn" onclick="filterOrders('new')">🆕 Новые</button>
            <button class="filter-btn" onclick="filterOrders('viewed')">✅ Просмотренные</button>
            <span style="flex:1"></span>
            <span style="color: rgba(255,255,255,0.5); font-size: 13px;"><i class="fas fa-sync-alt"></i> Автообновление: 10 сек</span>
        </div>
        
        <div id="ordersContainer">
            <div style="text-align: center; padding: 60px;"><div style="width: 50px; height: 50px; border: 3px solid rgba(99,102,241,0.3); border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div><p style="color: white;">Загрузка заявок...</p></div>
        </div>
    </div>
    
    <button class="refresh-btn" onclick="loadOrders()"><i class="fas fa-sync-alt"></i> Обновить данные</button>

    <!-- Модальное окно редактирования -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <h3><i class="fas fa-edit"></i> Редактировать заявку</h3>
            <input type="hidden" id="editId">
            <label>Клиент</label>
            <input type="text" id="editName" placeholder="Имя клиента">
            <label>Контакт</label>
            <input type="text" id="editContact" placeholder="Телефон или Telegram">
            <label>Услуга</label>
            <input type="text" id="editService" placeholder="Тип услуги">
            <label>Срок</label>
            <input type="text" id="editDeadline" placeholder="Срок выполнения">
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeModal()">Отмена</button>
                <button class="btn-save" onclick="saveOrder()">Сохранить</button>
            </div>
        </div>
    </div>

    <script>
        let allOrders = [];
        let currentFilter = 'all';
        
        async function loadOrders() {
            try {
                const response = await fetch('/api/orders/list');
                if (!response.ok) throw new Error('Ошибка загрузки');
                allOrders = await response.json();
                updateStats();
                renderOrders();
            } catch(e) {
                console.error(e);
                document.getElementById('ordersContainer').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Ошибка загрузки</h3><p>Не удалось загрузить заявки</p><button class="btn-action btn-copy" style="margin-top:20px;" onclick="loadOrders()">🔄 Попробовать снова</button></div>`;
            }
        }
        
        function updateStats() {
            const newOrders = allOrders.filter(o => o.status === 'new');
            const viewedOrders = allOrders.filter(o => o.status === 'viewed');
            const todayOrders = allOrders.filter(o => { const today = new Date().toDateString(); return new Date(o.date).toDateString() === today; });
            document.getElementById('totalCount').innerHTML = allOrders.length;
            document.getElementById('newCount').innerHTML = newOrders.length;
            document.getElementById('viewedCount').innerHTML = viewedOrders.length;
            document.getElementById('todayCount').innerHTML = todayOrders.length;
            if (newOrders.length > 0) document.title = `(${newOrders.length}) Новые заявки | SaaSPro Admin`;
            else document.title = `Заявки | SaaSPro Admin`;
        }
        
        function filterOrders(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderOrders();
        }
        
        function renderOrders() {
            const container = document.getElementById('ordersContainer');
            let filtered = [...allOrders];
            if (currentFilter === 'new') filtered = filtered.filter(o => o.status === 'new');
            if (currentFilter === 'viewed') filtered = filtered.filter(o => o.status === 'viewed');
            if (filtered.length === 0) { container.innerHTML = `<div class="empty-state"><div class="empty-icon">📭</div><h3>Нет заявок</h3><p>Пока нет ни одной заявки на разработку</p></div>`; return; }
            
            container.innerHTML = filtered.map(order => `
                <div class="order-card ${order.status === 'new' ? 'new' : ''}">
                    <div class="order-header">
                        <span class="badge ${order.status === 'new' ? 'badge-new' : 'badge-viewed'}">${order.status === 'new' ? '🆕 НОВАЯ ЗАЯВКА' : '✓ ПРОСМОТРЕНО'}</span>
                        <span class="order-date"><i class="far fa-calendar-alt me-1"></i>${order.date}</span>
                    </div>
                    <div class="order-info">
                        <div class="info-item"><div class="info-icon"><i class="fas fa-user-astronaut"></i></div><div class="info-text"><div class="info-label">Клиент</div><div class="info-value">${escapeHtml(order.name)}</div></div></div>
                        <div class="info-item"><div class="info-icon"><i class="fas fa-phone-alt"></i></div><div class="info-text"><div class="info-label">Контакт</div><div class="info-value">${escapeHtml(order.contact)}</div></div></div>
                        <div class="info-item"><div class="info-icon"><i class="fas fa-cube"></i></div><div class="info-text"><div class="info-label">Услуга</div><div class="info-value">${escapeHtml(order.service || '—')}</div></div></div>
                        <div class="info-item"><div class="info-icon"><i class="fas fa-hourglass-half"></i></div><div class="info-text"><div class="info-label">Срок</div><div class="info-value">${escapeHtml(order.deadline || '—')}</div></div></div>
                    </div>
                    <div class="order-actions">
                        <button class="btn-action btn-copy" onclick="copyContact('${escapeHtml(order.contact)}')"><i class="fas fa-copy"></i> Копировать</button>
                        <button class="btn-action btn-edit" onclick="openEditModal(${order.id})"><i class="fas fa-edit"></i> Редактировать</button>
                        <button class="btn-action btn-delete" onclick="deleteOrder(${order.id})"><i class="fas fa-trash"></i> Удалить</button>
                        ${order.status === 'new' ? `<button class="btn-action btn-view" onclick="markViewed(${order.id})"><i class="fas fa-check-circle"></i> Отметить просмотренным</button>` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function copyContact(contact) { navigator.clipboard.writeText(contact); alert('✅ Контакт скопирован: ' + contact); }
        async function markViewed(id) { await fetch(`/api/orders/${id}/view`, { method: 'PUT' }); loadOrders(); }
        
        function openEditModal(id) {
            const order = allOrders.find(o => o.id === id);
            if (!order) return;
            document.getElementById('editId').value = order.id;
            document.getElementById('editName').value = order.name;
            document.getElementById('editContact').value = order.contact;
            document.getElementById('editService').value = order.service || '';
            document.getElementById('editDeadline').value = order.deadline || '';
            document.getElementById('editModal').style.display = 'flex';
        }
        
        async function saveOrder() {
            const id = document.getElementById('editId').value;
            const data = {
                name: document.getElementById('editName').value,
                contact: document.getElementById('editContact').value,
                service: document.getElementById('editService').value,
                deadline: document.getElementById('editDeadline').value
            };
            try {
                await fetch(`/api/orders/${id}/update`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                closeModal();
                loadOrders();
                alert('✅ Заявка обновлена');
            } catch(e) { alert('❌ Ошибка обновления'); }
        }
        
        async function deleteOrder(id) {
            if (confirm('🗑️ Удалить заявку? Это действие нельзя отменить.')) {
                try { await fetch(`/api/orders/${id}/delete`, { method: 'DELETE' }); loadOrders(); alert('✅ Заявка удалена'); } 
                catch(e) { alert('❌ Ошибка удаления'); }
            }
        }
        
        function closeModal() { document.getElementById('editModal').style.display = 'none'; }
        
        loadOrders();
        setInterval(loadOrders, 10000);
    </script>
</body>
</html>
