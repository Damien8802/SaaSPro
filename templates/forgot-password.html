<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">`n    `n    `n    `n    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Восстановление пароля | SaaSPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .password-reset-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            width: 100%;
            max-width: 500px;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card-header {
            background: linear-gradient(145deg, #f8f9fe, #eef2f9);
            padding: 2rem;
            text-align: center;
        }
        .card-header h1 {
            font-weight: 700;
            color: #2d3748;
            font-size: 1.8rem;
        }
        .password-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 28px;
            margin: 0 auto 15px;
        }
        .card-body {
            padding: 2rem;
        }
        /* Основная форма EMAIL */
        .main-form {
            margin-bottom: 20px;
        }
        .form-floating {
            margin-bottom: 1rem;
        }
        .form-control {
            border-radius: 16px;
            border: 1.5px solid #e9edf4;
            padding: 0.75rem 1rem;
            height: auto;
            font-size: 1rem;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 16px;
            padding: 0.85rem;
            font-weight: 600;
            width: 100%;
            color: white;
            transition: all 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(102,126,234,0.4);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
            border-radius: 16px;
            padding: 0.85rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-outline:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        /* Кнопка "Другим способом" */
        .other-method-btn {
            text-align: center;
            margin: 15px 0;
        }
        .other-method-btn button {
            background: none;
            border: none;
            color: #667eea;
            font-weight: 600;
            cursor: pointer;
            font-size: 14px;
        }
        .other-method-btn button:hover {
            text-decoration: underline;
        }
        /* Дополнительные способы (скрыты по умолчанию) */
        .extra-methods {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
        .extra-methods.show {
            display: block;
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .method-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .method-choice {
            flex: 1;
            padding: 12px;
            border-radius: 16px;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }
        .method-choice i {
            font-size: 20px;
            margin-right: 8px;
        }
        .method-choice:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .method-choice.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .method-form {
            display: none;
        }
        .method-form.active {
            display: block;
        }
        .qr-container {
            text-align: center;
            padding: 10px 0;
        }
        .qr-code {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 20px;
            display: inline-block;
            margin: 10px 0;
        }
        .qr-code img {
            width: 200px;
            height: 200px;
            border-radius: 10px;
        }
        .status-badge {
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
            margin-top: 10px;
        }
        .status-pending { background: #fff3cd; color: #856404; }
        .status-scanned { background: #cce5ff; color: #004085; }
        .status-approved { background: #d4edda; color: #155724; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
        }
        .alert-success {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
<div class="password-reset-card">
    <div class="card-header">
        <div class="password-icon">
            <i class="fas fa-key"></i>
        </div>
        <h1>Восстановление пароля</h1>
        <p class="text-muted">Введите email для восстановления</p>
    </div>
    <div class="card-body">
        <!-- Основная форма EMAIL -->
        <div class="main-form">
            <form id="emailResetForm">
                <div class="form-floating">
                    <input type="email" class="form-control" id="resetEmail" placeholder="name@example.com" required>
                    <label>Email адрес</label>
                </div>
                <button type="submit" class="btn-primary">Отправить ссылку для сброса</button>
            </form>
        </div>

        <!-- Кнопка "Другим способом" -->
        <div class="other-method-btn">
            <button type="button" onclick="toggleExtraMethods()">
                <i class="fas fa-chevron-down"></i> Другим способом
            </button>
        </div>

        <!-- Дополнительные способы (телефон и QR) -->
        <div id="extraMethods" class="extra-methods">
            <div class="method-buttons">
                <div class="method-choice active" onclick="selectExtraMethod('phone')">
                    <i class="fas fa-phone"></i> Телефон
                </div>
                <div class="method-choice" onclick="selectExtraMethod('qr')">
                    <i class="fas fa-qrcode"></i> QR код
                </div>
            </div>

            <!-- Форма TELEPHONE -->
            <div id="phoneMethod" class="method-form active">
                <div id="phoneStep1">
                    <form id="phoneResetForm">
                        <div class="form-floating">
                            <input type="tel" class="form-control" id="resetPhone" placeholder="+7 999 123-45-67" required>
                            <label>Номер телефона</label>
                        </div>
                        <button type="submit" class="btn-primary" id="phoneSendCodeBtn">Отправить код</button>
                    </form>
                </div>
                <div id="phoneStep2" style="display: none;">
                    <form id="phoneCodeForm">
                        <div class="form-floating">
                            <input type="text" class="form-control" id="resetCode" placeholder="Код" required>
                            <label>Код подтверждения</label>
                        </div>
                        <div class="form-floating">
                            <input type="password" class="form-control" id="newPassword" placeholder="Новый пароль" required>
                            <label>Новый пароль</label>
                        </div>
                        <div class="form-floating">
                            <input type="password" class="form-control" id="confirmNewPassword" placeholder="Подтверждение" required>
                            <label>Подтвердите пароль</label>
                        </div>
                        <button type="submit" class="btn-primary">Сбросить пароль</button>
                    </form>
                </div>
            </div>

            <!-- Форма QR -->
            <div id="qrMethod" class="method-form">
                <div class="qr-container">
                    <div id="qrCodeContainer" class="qr-code">
                        <div class="spinner-border text-primary" role="status"></div>
                    </div>
                    <div id="qrStatus">
                        <div class="status-badge status-pending" id="qrStatusBadge">Генерация QR кода...</div>
                    </div>
                    <button type="button" class="btn-outline mt-3" onclick="refreshQR()" style="padding: 8px 20px; border-radius: 50px;">Обновить QR</button>
                </div>
            </div>
        </div>

        <a href="/login" class="back-link">← Вернуться ко входу</a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Показать/скрыть дополнительные способы
    function toggleExtraMethods() {
        const extra = document.getElementById('extraMethods');
        const btn = document.querySelector('.other-method-btn button');
        if (extra.classList.contains('show')) {
            extra.classList.remove('show');
            btn.innerHTML = '<i class="fas fa-chevron-down"></i> Другим способом';
        } else {
            extra.classList.add('show');
            btn.innerHTML = '<i class="fas fa-chevron-up"></i> Скрыть';
        }
    }

    // Выбор дополнительного способа (телефон / QR)
    function selectExtraMethod(method) {
        document.querySelectorAll('.method-choice').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        document.getElementById('phoneMethod').classList.remove('active');
        document.getElementById('qrMethod').classList.remove('active');
        
        if (method === 'phone') {
            document.getElementById('phoneMethod').classList.add('active');
        } else {
            document.getElementById('qrMethod').classList.add('active');
            loadQR();
        }
    }

    // ========== EMAIL ==========
    document.getElementById('emailResetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('resetEmail').value;
        const btn = e.target.querySelector('button');
        
        btn.innerHTML = 'Отправка...';
        btn.disabled = true;
        
        try {
            const response = await fetch('/api/auth/forgot-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await response.json();
            
            if (response.ok) {
                const container = document.querySelector('.main-form');
                container.innerHTML = `
                    <div class="alert alert-success text-center">
                        <i class="fas fa-check-circle fa-2x mb-2"></i>
                        <h4>Письмо отправлено!</h4>
                        <p>Ссылка для восстановления отправлена на <strong>${email}</strong></p>
                        <div class="alert alert-info mt-3">
                            <i class="fas fa-info-circle"></i> Проверьте папку "Спам", если письмо не пришло
                        </div>
                        <a href="/login" class="btn-primary mt-3" style="display: inline-block; width: auto; padding: 10px 30px;">Войти</a>
                    </div>
                `;
            } else {
                alert(data.error || 'Ошибка отправки');
            }
        } catch (error) {
            alert('Ошибка соединения');
        } finally {
            btn.innerHTML = 'Отправить ссылку для сброса';
            btn.disabled = false;
        }
    });

    // ========== TELEPHONE ==========
    let phoneResetToken = null;
    
    document.getElementById('phoneResetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const phone = document.getElementById('resetPhone').value;
        const btn = document.getElementById('phoneSendCodeBtn');
        
        btn.innerHTML = 'Отправка...';
        btn.disabled = true;
        
        try {
            const response = await fetch('/api/auth/send-reset-code', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone })
            });
            const data = await response.json();
            
            if (response.ok) {
                phoneResetToken = data.reset_token;
                document.getElementById('phoneStep1').style.display = 'none';
                document.getElementById('phoneStep2').style.display = 'block';
                alert('Код отправлен на телефон');
            } else {
                alert(data.error || 'Ошибка');
            }
        } catch (error) {
            alert('Ошибка соединения');
        } finally {
            btn.innerHTML = 'Отправить код';
            btn.disabled = false;
        }
    });
    
    document.getElementById('phoneCodeForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const code = document.getElementById('resetCode').value;
        const newPass = document.getElementById('newPassword').value;
        const confirmPass = document.getElementById('confirmNewPassword').value;
        
        if (newPass !== confirmPass) {
            alert('Пароли не совпадают');
            return;
        }
        if (newPass.length < 6) {
            alert('Пароль должен быть не менее 6 символов');
            return;
        }
        
        const btn = e.target.querySelector('button');
        btn.innerHTML = 'Сброс...';
        btn.disabled = true;
        
        try {
            const response = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ reset_token: phoneResetToken, code: code, new_password: newPass })
            });
            
            if (response.ok) {
                const container = document.getElementById('phoneMethod');
                container.innerHTML = `
                    <div class="alert alert-success text-center">
                        <i class="fas fa-check-circle fa-2x mb-2"></i>
                        <h4>Пароль изменен!</h4>
                        <p>Ваш пароль успешно обновлен</p>
                        <a href="/login" class="btn-primary mt-3" style="display: inline-block; width: auto; padding: 10px 30px;">Войти</a>
                    </div>
                `;
            } else {
                alert('Ошибка сброса пароля');
            }
        } catch (error) {
            alert('Ошибка соединения');
        } finally {
            btn.innerHTML = 'Сбросить пароль';
            btn.disabled = false;
        }
    });

    // ========== QR ==========
    let qrWebSocket = null;
    let qrSessionToken = null;
    let qrRefreshTimer = null;
    
    async function loadQR() {
        const container = document.getElementById('qrCodeContainer');
        const statusBadge = document.getElementById('qrStatusBadge');
        
        container.innerHTML = '<div class="spinner-border text-primary" role="status"></div>';
        statusBadge.innerHTML = 'Генерация QR кода...';
        statusBadge.className = 'status-badge status-pending';
        
        try {
            const response = await fetch('/api/auth/qr/generate-reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });
            const data = await response.json();
            
            if (response.ok) {
                qrSessionToken = data.session_token;
                container.innerHTML = `<img src="${data.qr_data_url}&t=${Date.now()}" alt="QR Code" style="width: 200px; height: 200px;">`;
                statusBadge.innerHTML = 'Ожидание сканирования';
                statusBadge.className = 'status-badge status-pending';
                
                if (qrWebSocket) qrWebSocket.close();
                connectWebSocket(qrSessionToken);
                
                if (qrRefreshTimer) clearTimeout(qrRefreshTimer);
                qrRefreshTimer = setTimeout(() => refreshQR(), (data.expires_in - 5) * 1000);
            } else {
                container.innerHTML = '<div class="alert alert-danger">Ошибка QR кода</div>';
            }
        } catch (error) {
            container.innerHTML = '<div class="alert alert-danger">Ошибка соединения</div>';
        }
    }
    
    function connectWebSocket(token) {
        const wsUrl = `ws://${window.location.host}/api/qr/reset-status?token=${token}`;
        qrWebSocket = new WebSocket(wsUrl);
        
        qrWebSocket.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const statusBadge = document.getElementById('qrStatusBadge');
            
            switch(data.status) {
                case 'scanned':
                    statusBadge.innerHTML = 'QR код отсканирован! Ожидание подтверждения...';
                    statusBadge.className = 'status-badge status-scanned';
                    break;
                case 'approved':
                    statusBadge.innerHTML = 'Сброс подтвержден! Перенаправление...';
                    statusBadge.className = 'status-badge status-approved';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 1500);
                    break;
                case 'expired':
                    statusBadge.innerHTML = 'QR истек, обновляем...';
                    statusBadge.className = 'status-badge status-expired';
                    setTimeout(() => refreshQR(), 1000);
                    break;
            }
        };
        
        qrWebSocket.onerror = () => {
            statusBadge.innerHTML = 'Ошибка соединения';
            statusBadge.className = 'status-badge status-expired';
        };
    }
    
    function refreshQR() {
        if (qrWebSocket) qrWebSocket.close();
        if (qrRefreshTimer) clearTimeout(qrRefreshTimer);
        loadQR();
    }
</script>
</body>
</html>
