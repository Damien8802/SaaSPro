<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль разработчика | SaaSPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
        }
        .bg-animation::after {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 80% 50%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
            animation: float 15s ease-in-out infinite reverse;
        }
        @keyframes float {
            0%, 100% { transform: translate(-10%, -10%) rotate(0deg); }
            50% { transform: translate(10%, 10%) rotate(5deg); }
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .profile-card {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(99, 102, 241, 0.3);
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .profile-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 40px;
            text-align: center;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 4px solid rgba(255,255,255,0.5);
        }
        .profile-name {
            font-size: 28px;
            font-weight: 800;
            color: white;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 30px;
            background: rgba(0,0,0,0.2);
        }
        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #a5b4fc;
        }
        .stat-label {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        .profile-info {
            padding: 30px;
        }
        .info-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .info-label {
            width: 150px;
            color: rgba(255,255,255,0.6);
        }
        .info-value {
            flex: 1;
            color: white;
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99,102,241,0.4);
        }
        .btn-admin {
            background: linear-gradient(135deg, #f59e0b, #ea580c);
            color: white;
        }
        .btn-admin:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(245,158,11,0.4);
        }
        .btn-outline {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.2);
        }
        .badge-dev { background: linear-gradient(135deg, #f59e0b, #ea580c); color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; display: inline-block; }
        .badge-admin { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; padding: 4px 12px; border-radius: 20px; font-size: 11px; display: inline-block; }
        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .info-row { flex-direction: column; gap: 5px; }
            .info-label { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar" id="avatar">👨‍💻</div>
                <h1 class="profile-name" id="userName">Разработчик</h1>
                <div>
                    <span class="badge-dev">⭐ Lead Developer</span>
                    <span class="badge-admin">🛡️ Администратор</span>
                </div>
            </div>
            <div class="stats-grid">
                <div class="stat-item"><div class="stat-number" id="projectsCount">7</div><div class="stat-label">Проектов</div></div>
                <div class="stat-item"><div class="stat-number" id="activeServices">3</div><div class="stat-label">Активных</div></div>
                <div class="stat-item"><div class="stat-number">99.9%</div><div class="stat-label">Аптайм</div></div>
                <div class="stat-item"><div class="stat-number">24/7</div><div class="stat-label">Поддержка</div></div>
            </div>
            <div class="profile-info">
                <div class="info-title"><i class="fas fa-user"></i> Личная информация</div>
                <div class="info-row"><div class="info-label">Email</div><div class="info-value" id="userEmail">dev@saaspro.ru</div></div>
                <div class="info-row"><div class="info-label">Имя</div><div class="info-value" id="userLogin">Разработчик</div></div>
                <div class="info-row"><div class="info-label">Дата регистрации</div><div class="info-value">15 марта 2025</div></div>
                
                <div class="info-title" style="margin-top:30px;"><i class="fas fa-shield-alt"></i> Безопасность</div>
                <div class="info-row"><div class="info-label">2FA статус</div><div class="info-value"><span style="color:#10b981;">✓ Включена</span></div></div>
                <div class="info-row"><div class="info-label">Trusted devices</div><div class="info-value">2 устройства</div></div>
                
                <div class="action-buttons">
                    <a href="/settings" class="btn btn-primary"><i class="fas fa-sliders-h"></i> Настройки</a>
                    <a href="/developer/admin" class="btn btn-admin"><i class="fas fa-shield-alt"></i> 🔐 Админ-панель</a>
                    <a href="/" class="btn btn-outline"><i class="fas fa-home"></i> На главную</a>
                </div>
            </div>
        </div>
    </div>
    <script>
        async function loadUserData() {
            try {
                const response = await fetch('/api/current-user');
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('userName').innerText = user.name || 'Разработчик';
                    document.getElementById('userEmail').innerText = user.email || 'dev@saaspro.ru';
                    document.getElementById('userLogin').innerText = user.name || 'Разработчик';
                    const avatar = document.getElementById('avatar');
                    const firstName = (user.name || 'Р').charAt(0).toUpperCase();
                    avatar.innerHTML = firstName;
                    avatar.style.fontSize = '48px';
                    avatar.style.fontWeight = 'bold';
                    avatar.style.color = '#667eea';
                }
            } catch(e) { console.log(e); }
        }
        loadUserData();
    </script>


</body>
</html>
