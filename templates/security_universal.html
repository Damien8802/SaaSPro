<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Безопасность | SaaSPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            padding: 30px;
            color: #ffffff;
        }
        .card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }
        h1 { color: #a5b4fc; margin-bottom: 20px; text-align: center; }
        h3 { color: #e2e8f0; }
        p { color: #94a3b8; }
        .qrcode { text-align: center; margin: 20px 0; }
        .secret-box { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; text-align: center; margin: 15px 0; border: 1px solid rgba(99,102,241,0.3); }
        .secret-box code { color: #fbbf24; font-size: 14px; word-break: break-all; }
        .code-input { text-align: center; font-size: 24px; letter-spacing: 5px; padding: 10px; width: 100%; border: 2px solid #4f46e5; border-radius: 10px; background: rgba(0,0,0,0.3); color: white; }
        .code-input:focus { outline: none; border-color: #818cf8; }
        .btn-2fa { background: linear-gradient(135deg, #4f46e5, #7c3aed); color: white; border: none; padding: 12px 30px; border-radius: 50px; cursor: pointer; width: 100%; margin-top: 15px; transition: all 0.3s; }
        .btn-2fa:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79,70,229,0.4); }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #bb2d3b; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: inline-block; }
        .status-enabled { background: #10b981; color: white; }
        .status-disabled { background: #f59e0b; color: #1a1a2e; }
        .backup-codes { background: rgba(0,0,0,0.2); border-radius: 10px; padding: 15px; display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px; }
        .code-item { background: rgba(255,255,255,0.1); padding: 8px 12px; border-radius: 8px; font-family: monospace; font-size: 14px; color: #fbbf24; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: rgba(15, 23, 42, 0.98); border-radius: 20px; padding: 30px; max-width: 450px; width: 90%; border: 1px solid rgba(99,102,241,0.4); }
        .modal-content h3 { color: white; }
        .alert-warning { background: rgba(245,158,11,0.2); border: 1px solid #f59e0b; border-radius: 10px; padding: 15px; margin-bottom: 20px; color: #fbbf24; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .text-center { text-align: center; }
        .mt-2 { margin-top: 10px; }
        .mt-3 { margin-top: 15px; }
        .w-100 { width: 100%; }
        hr { border-color: rgba(255,255,255,0.1); }
        
        .back-button {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            padding: 12px 28px;
            border-radius: 40px !important;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
            z-index: 9999;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            border: none;
        }
        .back-button:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            color: white;
        }
        
        .ai-floating-widget {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 9999;
        }
        .ai-widget-button {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: none;
            font-size: 26px;
            color: #fff;
            transition: all 0.3s;
            position: relative;
        }
        .ai-widget-button:hover { transform: scale(1.1); }
        .ai-widget-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            width: 12px;
            height: 12px;
            background: #10b981;
            border-radius: 50%;
            border: 2px solid #1a1a2e;
        }
        .ai-widget-tooltip {
            position: absolute;
            left: 70px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .ai-floating-widget:hover .ai-widget-tooltip { opacity: 1; }
        
        @media (max-width: 768px) {
            .back-button { padding: 10px 20px; font-size: 14px; bottom: 20px; right: 20px; }
            .ai-floating-widget { bottom: 20px; left: 20px; }
        }
    </style>
</head>
<body>

<div class="card">
    <h1><i class="fas fa-shield-alt"></i> Безопасность</h1>
    
    <div class="flex-between">
        <div>
            <h3>Двухфакторная аутентификация</h3>
            <p>Защитите аккаунт дополнительным кодом</p>
        </div>
        <div>
            <span id="statusBadge" class="status-badge status-disabled">❌ Не настроена</span>
            <button id="actionBtn" class="btn-2fa mt-2">
                <i class="fas fa-qrcode"></i> Настроить 2FA
            </button>
        </div>
    </div>

    <div id="backupSection" style="display: none; margin-top: 20px;">
        <hr>
        <h3><i class="fas fa-key"></i> Резервные коды</h3>
        <div id="backupCodesContainer"></div>
        <button id="generateBackupBtn" class="btn-2fa mt-2" style="display: none;">
            <i class="fas fa-sync-alt"></i> Создать новые коды
        </button>
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Настройка 2FA</h3>
        <div id="modalBody"></div>
        <button class="btn-2fa mt-3" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<a href="javascript:history.back()" class="back-button" title="Назад">
    <i class="fas fa-arrow-left"></i> Назад
</a>

<div class="ai-floating-widget">
    <div class="ai-widget-button" onclick="openAIAssistant()">
        🤖
        <div class="ai-widget-badge">●</div>
    </div>
    <div class="ai-widget-tooltip">💬 Спросить AI ассистента</div>
</div>

<script>
    let userId = null;
    let currentSecret = '';

    // Безопасное декодирование JWT
    function parseJwt(token) {
        try {
            if (!token) return null;
            const base64Url = token.split('.')[1];
            if (!base64Url) return null;
            const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        } catch(e) {
            console.error('JWT parse error:', e);
            return null;
        }
    }

    // Получение user_id из JWT токена
    function getUserIdFromToken() {
        const token = localStorage.getItem('token');
        if (!token) return null;
        
        const payload = parseJwt(token);
        if (payload) {
            if (payload.user_id) return payload.user_id;
            if (payload.sub) return payload.sub;
        }
        return null;
    }

    // Получение user_id
    async function getUserId() {
        // Из памяти
        if (userId && userId !== '00000000-0000-0000-0000-000000000000') {
            return userId;
        }
        
        // Из localStorage
        let uid = localStorage.getItem('user_id');
        if (uid && uid !== '00000000-0000-0000-0000-000000000000') {
            userId = uid;
            return userId;
        }
        
        // Из токена
        uid = getUserIdFromToken();
        if (uid) {
            userId = uid;
            localStorage.setItem('user_id', uid);
            return userId;
        }
        
        // Из API
        try {
            const res = await fetch('/api/current-user');
            if (res.ok) {
                const data = await res.json();
                if (data.user_id && data.user_id !== '00000000-0000-0000-0000-000000000000') {
                    userId = data.user_id;
                    localStorage.setItem('user_id', userId);
                    return userId;
                }
            }
        } catch(e) {
            console.error('API error:', e);
        }
        
        return null;
    }

    // Загрузка статуса 2FA
    async function loadStatus() {
        const badge = document.getElementById('statusBadge');
        const btn = document.getElementById('actionBtn');
        
        const uid = await getUserId();
        
        if (!uid) {
            badge.innerHTML = '❌ Войдите в аккаунт';
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Войти';
            btn.onclick = () => { window.location.href = '/login'; };
            return;
        }
        
        try {
            const res = await fetch(`/api/2fa/status?user_id=${uid}`);
            const data = await res.json();
            
            if (data.enabled === true) {
                badge.innerHTML = '✅ Включена';
                badge.className = 'status-badge status-enabled';
                btn.innerHTML = '<i class="fas fa-trash"></i> Отключить 2FA';
                btn.onclick = () => disable2FA();
                btn.disabled = false;
                document.getElementById('backupSection').style.display = 'block';
                document.getElementById('generateBackupBtn').style.display = 'block';
                document.getElementById('generateBackupBtn').onclick = () => generateBackupCodes();
                loadBackupCodes();
            } else {
                badge.innerHTML = '❌ Не настроена';
                badge.className = 'status-badge status-disabled';
                btn.innerHTML = '<i class="fas fa-qrcode"></i> Настроить 2FA';
                btn.onclick = () => setup2FA();
                btn.disabled = false;
                document.getElementById('backupSection').style.display = 'none';
            }
        } catch(e) {
            console.error('Status error:', e);
            badge.innerHTML = '❌ Ошибка';
        }
    }

    // Настройка 2FA
    async function setup2FA() {
        const uid = await getUserId();
        if (!uid) {
            alert('Ошибка: пользователь не авторизован');
            window.location.href = '/login';
            return;
        }
        
        showModal('Настройка 2FA', '<div class="text-center">Загрузка...</div>');
        
        try {
            const res = await fetch(`/api/2fa/generate?user_id=${uid}`);
            const data = await res.json();
            
            if (data.secret) {
                currentSecret = data.secret;
                document.getElementById('modalBody').innerHTML = `
                    <div class="text-center">
                        <p>Отсканируйте QR-код в приложении:</p>
                        <div class="qrcode">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=otpauth://totp/SaaSPro:${encodeURIComponent(uid)}?secret=${data.secret}&issuer=SaaSPro" alt="QR Code" style="background: white; padding: 10px; border-radius: 10px;">
                        </div>
                        <p>Или введите секрет вручную:</p>
                        <div class="secret-box"><code>${data.secret}</code></div>
                        <p>Введите код из приложения:</p>
                        <input type="text" id="codeInput" class="code-input" placeholder="000000" maxlength="6">
                        <button class="btn-2fa mt-2 w-100" onclick="verify2FA()">Подтвердить</button>
                    </div>
                `;
                const input = document.getElementById('codeInput');
                input.focus();
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') verify2FA();
                });
            } else {
                document.getElementById('modalBody').innerHTML = '<div class="alert alert-danger">Ошибка генерации секрета</div>';
            }
        } catch(e) {
            console.error('Setup error:', e);
            document.getElementById('modalBody').innerHTML = '<div class="alert alert-danger">Ошибка загрузки</div>';
        }
    }

    // Подтверждение 2FA
    async function verify2FA() {
        const uid = await getUserId();
        const code = document.getElementById('codeInput').value;
        
        if (!code || code.length !== 6) {
            alert('Введите 6-значный код');
            return;
        }
        
        try {
            const res = await fetch('/api/2fa/verify', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: uid, code: code, secret: currentSecret })
            });
            const data = await res.json();
            
            if (data.success) {
                closeModal();
                alert('✅ 2FA успешно настроена!');
                loadStatus();
            } else {
                alert('❌ Неверный код');
            }
        } catch(e) {
            console.error('Verify error:', e);
            alert('Ошибка');
        }
    }

    // Отключение 2FA
    async function disable2FA() {
        const uid = await getUserId();
        
        if (!confirm('Отключить 2FA?')) return;
        
        const code = prompt('Введите код из Google Authenticator:');
        if (!code) return;
        
        try {
            const res = await fetch('/api/2fa/disable', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: uid, code: code })
            });
            const data = await res.json();
            
            if (data.success) {
                alert('2FA отключена');
                loadStatus();
            } else {
                alert('Неверный код');
            }
        } catch(e) {
            console.error('Disable error:', e);
            alert('Ошибка');
        }
    }

    // Загрузка резервных кодов
    async function loadBackupCodes() {
        const uid = await getUserId();
        if (!uid) return;
        
        try {
            const res = await fetch(`/api/2fa/backup-codes?user_id=${uid}`);
            const data = await res.json();
            const container = document.getElementById('backupCodesContainer');
            
            if (data.codes && data.codes.length > 0) {
                container.innerHTML = `<div class="backup-codes">${data.codes.map(c => `<span class="code-item">${c}</span>`).join('')}</div>`;
            } else {
                container.innerHTML = '<p style="color:#94a3b8;">Нет резервных кодов. Нажмите "Создать новые коды"</p>';
            }
        } catch(e) {
            console.error(e);
        }
    }

    // Генерация резервных кодов
    async function generateBackupCodes() {
        const uid = await getUserId();
        if (!uid) {
            alert('Ошибка: пользователь не авторизован');
            return;
        }
        
        try {
            const res = await fetch('/api/2fa/backup-codes', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user_id: uid })
            });
            const data = await res.json();
            
            if (data.codes) {
                showModal('Резервные коды', `
                    <div class="alert-warning"><strong>⚠️ ВАЖНО!</strong> Сохраните эти коды в надежном месте.</div>
                    <div class="backup-codes">${data.codes.map(c => `<span class="code-item">${c}</span>`).join('')}</div>
                    <button class="btn-2fa w-100 mt-3" onclick="closeModal(); loadBackupCodes();">Понятно, сохранил</button>
                `);
            }
        } catch(e) {
            console.error('Generate codes error:', e);
            alert('Ошибка генерации кодов');
        }
    }

    function showModal(title, body) {
        document.getElementById('modalTitle').innerHTML = title;
        document.getElementById('modalBody').innerHTML = body;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
    }

    function openAIAssistant() {
        window.open('/ai-assistant', '_blank', 'width=500,height=700,left=' + (screen.width - 520) + ',top=100');
    }

    window.onclick = function(e) {
        if (e.target.classList.contains('modal')) closeModal();
    };
    
    // Запуск
    loadStatus();
</script>
</body>
</html>
